<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
 <link rel="stylesheet" href="./style.css">
  <style>
    body {
      text-align: center;

      margin: 0;
      padding: 0;

    input, button {
      padding: 12px;

    .tempo {
      border: brown 4px double;
      margin: 5%;
      width: 90%;

    }

    .resultado {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
<title>HORA GC</title>
</head >
<body class="body">
      <p id="alInicio" class="principio"></p>
    <header>
      <div class="container">
        <p class="logo"> FAMILIA </p>
        <!-- ****************************************************** -->
        <a href="#alInicio"><img src="./media/CERVERA.png" alt="" class="logoC"></a>
        <a href="./index.html" class="nombre">INICIO </a>
      </div>
    </header> <br><br>
    <!-- ****************************************************************** -->
 
<div class="tempo">


<h2>📅 TIEMPO DE GIANCARLO</h2>

<p><b>Fecha inicio del ciclo Día </b></p>
<input type="date" id="inicio">

<p><b>Fecha que desea consultar:</b></p>
<input type="date" id="consulta">

<br>
<button onclick="calcular()">Consultar</button>

<div class="resultado" id="resultado"></div>
<br><br><br>
</div>
<script>
    //  CONFIGURAR AQUÍ SU FECHA INICIAL FIJA
const fechaInicioFija = "2026-03-16"; // <-- cambie esta fecha si desea

window.onload = function() {
    // Colocar fecha de inicio
    document.getElementById("inicio").value = fechaInicioFija;

    // Colocar fecha de hoy automáticamente
    const hoy = new Date();
    const hoyFormato = hoy.toISOString().split("T")[0];
    document.getElementById("consulta").value = hoyFormato;
};
function calcular() {
    const inicio = new Date(document.getElementById("inicio").value);
    const consulta = new Date(document.getElementById("consulta").value);

    if (isNaN(inicio) || isNaN(consulta)) {
        document.getElementById("resultado").innerHTML = "Ingrese ambas fechas.";
        return;
    }

    const diferencia = Math.floor((consulta - inicio) / (1000 * 60 * 60 * 24));

    // Día dentro del ciclo de 12 días
    let dia = ((diferencia % 12) + 12) % 12;

    let estado = "";

    if (dia < 4) {
        estado = "TRABAJA DE DÍA ☀️";
    } else if (dia < 6) {
        estado = "DESCANSO 😌";
    } else if (dia < 10) {
        estado = "TRABAJA DE NOCHE 🌙";
    } else {
        estado = "DESCANSO 😌";
    }

    // 🔍 Buscar próximo descanso
    let diasParaDescanso = 0;

    for (let i = 0; i < 12; i++) {
        let futuro = (dia + i) % 12;

        if (futuro >= 4 && futuro < 6 || futuro >= 10) {
            diasParaDescanso = i;
            break;
        }
    }

    let fechaDescanso = new Date(consulta);
    fechaDescanso.setDate(consulta.getDate() + diasParaDescanso);

    let sugerencia = "";
    if (estado.includes("DESCANSO")) {
        sugerencia = "✅ Buen momento para llamarlo";
    } else if (estado.includes("DÍA")) {
        sugerencia = "⚠️ Probablemente está ocupado";
    } else {
        sugerencia = "🌙 Puede estar durmiendo, mejor llama a Karol";
    }

    document.getElementById("resultado").innerHTML =
        `<b>Resultado:</b><br>${estado}<br>${sugerencia}<br><br>
        <b>📅 Próximo descanso:</b><br>
        En ${diasParaDescanso} día(s) → ${fechaDescanso.toLocaleDateString()}`;
}
   
</script>

</body>
</html>
