<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Lista de cortes</title>
<style>
    body { font-family: Arial; margin: 30px; }
    input { margin: 5px; padding: 5px; }
    button { padding: 8px 15px; margin-top: 10px; }
    table { border-collapse: collapse; margin-top: 20px; width: 100%; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
    th { background-color: #f0f0f0; }
</style>
</head>
<body>

<h2>🪑 Generador de lista de cortes en mm 1100 900 500</h2>

<label>Largo (L):</label><input type="number" id="L"><br>
<label>Alto (A):</label><input type="number" id="A"><br>
<label>Profundidad (P):</label><input type="number" id="P"><br>
<label>Espesor (E):</label><input type="number" id="E"><br>
<label>Columnas de cajones (CC):</label><input type="number" id="CC"><br>
<label>Cajones por columna (CXC):</label><input type="number" id="CXC"><br>

<br>
<button onclick="generar()">Generar lista</button>

<table id="tabla">
    <thead>
        <tr>
            <th>Cantidad</th>
            <th>Pieza</th>
            <th>Largo</th>
            <th>Ancho</th>
            <th>CANTO: LARGO</th>
            <th>CANTO: ANCHO</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
function generar() {

    let L = parseFloat(document.getElementById("L").value) || 0;
    let P = parseFloat(document.getElementById("P").value) || 0;
    let E = parseFloat(document.getElementById("E").value) || 0;
    let CC = parseInt(document.getElementById("CC").value) || 0;
    let CXC = parseInt(document.getElementById("CXC").value) || 0;

    let totalCajones = CC * CXC;

    let piezas = [
        {cant: 2, nombre: "Lados del mueble", largo: L, ancho: P, CL: "2", CA: "2" },
        
        {cant: 1, nombre: "Zócalo", largo: L - (2 * E), ancho: 100, CL: "2", CA: "-" },

        {cant: 1, nombre: "Tapa del mueble", largo: L, ancho: P, CL: "2", CA: "2" },
        {cant: 3, nombre: "Soportes", largo: L*0.15, ancho: L-(2*E), CL: "-", CA: "-" },

        {cant: totalCajones * 2, nombre: "Lados de cajón", largo: P-50, ancho: "15", CL: "2", CA: "-" },
        {cant: totalCajones * 2, nombre: "Frente/trasera de cajón", largo: 2*L-(6*E)-(25*CC), ancho: "15", CL: "2", CA: "-" },
        {cant: totalCajones, nombre: "Tapa de cajón", largo:(L/CC)-6 , ancho:(A -100)*0.1* CXC  , CL:"2" , CA: "2" }
    ];

    let tbody = document.querySelector("#tabla tbody");
    tbody.innerHTML = "";

    piezas.forEach(p => {
        let fila = `
        <tr>
            <td>${p.cant}</td>
            <td>${p.nombre}</td>
            <td>${p.largo}</td>
            <td>${p.ancho}</td>
            <td>${p.CL}</td>
            <td>${p.CA}</td>
        </tr>`;
        tbody.innerHTML += fila;
    });
}
</script>

</body>
</html>
